<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WarkopSaja — Kalkulator Pajak UMKM</title>

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useCallback, useMemo, useEffect, useRef } = React;

/* ─── helpers ─── */
const fmt = (n) => { if (!n && n !== 0) return "Rp 0"; return "Rp " + Math.round(n).toLocaleString("id-ID"); };
const pn = (s) => { const c = (s || "").toString().replace(/[^\d]/g, ""); return c ? parseInt(c, 10) : 0; };

const MONTHS = ["Jan","Feb","Mar","Apr","Mei","Jun","Jul","Agu","Sep","Okt","Nov","Des"];
const MF = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
const TFT = 500_000_000, UR = 0.005, URL_ = 4_800_000_000;

const CATS = [
  { key:"gaji", label:"Gaji Karyawan", icon:"👥", color:"#F4A83D", bg:"rgba(244,168,61,0.1)", ph:"cth: Gaji Budi" },
  { key:"utilitas", label:"Listrik, Air, Internet", icon:"⚡", color:"#5CB8E4", bg:"rgba(92,184,228,0.1)", ph:"cth: Tagihan PLN" },
  { key:"elektronik", label:"Alat Elektronik", icon:"💻", color:"#A78BFA", bg:"rgba(167,139,250,0.1)", ph:"cth: Printer Canon" },
];

let _id = Date.now(); const nid = () => ++_id;
const emptyM = () => ({ revenue:"", items:{ gaji:[], utilitas:[], elektronik:[] } });

/* ─── design tokens ─── */
const T = {
  bg:"#0C0A09", card:"rgba(28,25,23,0.8)", cardBorder:"rgba(255,255,255,0.04)",
  glass:"rgba(255,255,255,0.03)", surface:"rgba(41,37,36,0.6)",
  text:"#FAFAF9", textSec:"#A8A29E", textMuted:"#78716C",
  accent:"#F59E0B", accentGlow:"rgba(245,158,11,0.15)",
  green:"#34D399", greenBg:"rgba(52,211,153,0.08)",
  red:"#F87171", redBg:"rgba(248,113,113,0.08)",
  radius:16, radiusSm:10, radiusXs:8,
};
const font = `'SF Pro Display','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif`;

/* ─── localStorage helper (ganti window.storage) ─── */
const STORAGE_KEY = "warkopsaja-data";
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) { console.error("Load failed", e); }
  return null;
}
function saveData(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) { console.error("Save failed", e); }
}

/* ─── CSV generator ─── */
function generateCSV(months, md) {
  const rows = [["Bulan","Omzet","Gaji Karyawan","Detail Gaji","Listrik/Air/Internet","Detail Utilitas","Alat Elektronik","Detail Elektronik","Total Pengeluaran","Pajak PPh Final","Laba Bersih"]];
  MF.forEach((m,i) => {
    const d = md[i], mo = months[i];
    const detGaji = mo.items.gaji.map(x=>`${x.name}: ${fmt(pn(x.amount))}`).join("; ") || "-";
    const detUtil = mo.items.utilitas.map(x=>`${x.name}: ${fmt(pn(x.amount))}`).join("; ") || "-";
    const detElek = mo.items.elektronik.map(x=>`${x.name}: ${fmt(pn(x.amount))}`).join("; ") || "-";
    rows.push([m, d.revenue, d.gaji, detGaji, d.utilitas, detUtil, d.elektronik, detElek, d.totalExpense, Math.round(d.tax), Math.round(d.netProfit)]);
  });
  const t = md.reduce((a,d)=>({ r:a.r+d.revenue, g:a.g+d.gaji, u:a.u+d.utilitas, e:a.e+d.elektronik, te:a.te+d.totalExpense, tx:a.tx+d.tax, np:a.np+d.netProfit }),{r:0,g:0,u:0,e:0,te:0,tx:0,np:0});
  rows.push(["TOTAL", t.r, t.g, "", t.u, "", t.e, "", t.te, Math.round(t.tx), Math.round(t.np)]);
  return rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
}

function downloadCSV(months, md) {
  const csv = "\uFEFF" + generateCSV(months, md);
  const blob = new Blob([csv], { type:"text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href = url;
  a.download = `WarkopSaja_Laporan_Pengeluaran_${new Date().getFullYear()}.csv`;
  a.click(); URL.revokeObjectURL(url);
}

  <p style="margin-top:8px;color:#d4d4d4">⚠️ Dokumen ini hanya estimasi. Konsultasikan dengan konsultan pajak untuk kepastian hukum.</p>

</body></html>`;
  return html;
}

function downloadPDF(months, md, tots, entityType) {
  const html = generatePDFReport(months, md, tots, entityType);
  const w = window.open("", "_blank");
  if (w) { w.document.write(html); w.document.close(); setTimeout(() => { w.print(); }, 500); }
}

/* ─── shared components ─── */
function RpInput({ value, onChange, placeholder, small, style: xs }) {
  const dv = value ? pn(value).toLocaleString("id-ID") : "";
  return (
    <div style={{ position:"relative", flex:1, ...xs }}>
      <input type="text" inputMode="numeric" placeholder={placeholder||"0"} value={dv}
        onChange={(e) => onChange(e.target.value.replace(/[^\d]/g,""))}
        style={{
          width:"100%", padding: small?"8px 8px 8px 28px":"11px 12px 11px 32px",
          borderRadius:T.radiusXs, border:`1px solid ${T.cardBorder}`,
          background:T.surface, color:T.text, fontSize: small?12:14,
          fontWeight:500, outline:"none", boxSizing:"border-box",
          fontFamily:font, transition:"border-color 0.2s, box-shadow 0.2s",
        }}
        onFocus={(e)=>{ e.target.style.borderColor="rgba(245,158,11,0.4)"; e.target.style.boxShadow="0 0 0 3px rgba(245,158,11,0.08)"; }}
        onBlur={(e)=>{ e.target.style.borderColor=T.cardBorder; e.target.style.boxShadow="none"; }}
      />
      <span style={{ position:"absolute", left:small?8:12, top:"50%", transform:"translateY(-50%)", color:T.textMuted, fontSize:small?10:11, fontWeight:600, letterSpacing:0.5 }}>Rp</span>
    </div>
  );
}

function Card({ children, style, glow }) {
  return (
    <div style={{
      padding:20, borderRadius:T.radius,
      background:T.card, border:`1px solid ${T.cardBorder}`,
      backdropFilter:"blur(20px)",
      boxShadow: glow?`0 0 40px ${T.accentGlow}, 0 8px 32px rgba(0,0,0,0.3)`:"0 4px 24px rgba(0,0,0,0.15)",
      ...style,
    }}>{children}</div>
  );
}

function Pill({ children, active, onClick }) {
  return (
    <button onClick={onClick} style={{
      padding:"9px 0", fontSize:12, fontWeight:600, border:"none",
      background:"transparent", color:active?T.accent:T.textMuted,
      cursor:"pointer", fontFamily:font, position:"relative",
      letterSpacing:0.3, flex:1, transition:"color 0.2s",
    }}>
      {children}
      {active && <div style={{ position:"absolute", bottom:0, left:"20%", right:"20%", height:2, borderRadius:1, background:`linear-gradient(90deg, transparent, ${T.accent}, transparent)` }} />}
    </button>
  );
}

function ItemLog({ items, catKey, cat, onAdd, onRemove }) {
  const [name, setName] = useState("");
  const [amount, setAmount] = useState("");
  const total = items.reduce((s,it)=>s+pn(it.amount),0);
  const handleAdd = () => {
    if(!amount&&!name)return;
    onAdd(catKey, { id:nid(), name:name||cat.label, amount:amount||"0" });
    setName(""); setAmount("");
  };
  return (
    <div style={{ marginBottom:8 }}>
      <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:6, padding:"0 2px" }}>
        <span style={{ fontSize:16 }}>{cat.icon}</span>
        <span style={{ fontSize:12, fontWeight:600, color:cat.color, flex:1 }}>{cat.label}</span>
        <span style={{ fontSize:11, fontWeight:700, color:total>0?T.text:T.textMuted, background:total>0?cat.bg:"transparent", padding:total>0?"3px 8px":0, borderRadius:6 }}>{total>0?fmt(total):"—"}</span>
      </div>
      {items.map((item)=>(
        <div key={item.id} style={{ display:"flex", alignItems:"center", gap:8, marginBottom:3, padding:"7px 10px", borderRadius:T.radiusXs, background:T.glass, borderLeft:`2px solid ${cat.color}` }}>
          <span style={{ flex:1, fontSize:12, color:T.textSec, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{item.name}</span>
          <span style={{ fontSize:12, fontWeight:600, color:T.text, whiteSpace:"nowrap" }}>{fmt(pn(item.amount))}</span>
          <button onClick={()=>onRemove(catKey,item.id)} style={{ width:24, height:24, borderRadius:6, border:"none", background:T.redBg, color:T.red, fontSize:14, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", padding:0, flexShrink:0 }}>×</button>
        </div>
      ))}
      <div style={{ display:"flex", gap:4, alignItems:"center", marginTop:4 }}>
        <input type="text" placeholder={cat.ph} value={name} onChange={(e)=>setName(e.target.value)}
          style={{ flex:1, padding:"8px 10px", borderRadius:T.radiusXs, minWidth:0, border:`1px solid ${T.cardBorder}`, background:T.surface, color:T.text, fontSize:11, outline:"none", boxSizing:"border-box", fontFamily:font }}
          onFocus={(e)=>{e.target.style.borderColor=`${cat.color}44`;}} onBlur={(e)=>{e.target.style.borderColor=T.cardBorder;}}
        />
        <RpInput value={amount} onChange={setAmount} small style={{ maxWidth:120 }} />
        <button onClick={handleAdd} style={{
          width:34, height:34, borderRadius:T.radiusXs, border:"none", flexShrink:0,
          background:`linear-gradient(135deg, ${cat.color}, ${cat.color}cc)`,
          color:"#000", fontSize:18, fontWeight:700, cursor:"pointer",
          display:"flex", alignItems:"center", justifyContent:"center", padding:0,
          boxShadow:`0 2px 12px ${cat.color}33`,
        }}>+</button>
      </div>
    </div>
  );
}

function ActionBtn({ icon, label, onClick, color }) {
  return (
    <button onClick={onClick} style={{
      flex:1, padding:"14px 10px", borderRadius:T.radiusSm,
      border:`1px solid ${color||T.accent}22`,
      background:`${color||T.accent}08`, color:color||T.accent,
      fontSize:11, fontWeight:600, cursor:"pointer", fontFamily:font,
      display:"flex", flexDirection:"column", alignItems:"center", gap:6,
      transition:"background 0.2s, transform 0.15s",
    }}
    onMouseDown={(e)=>{e.currentTarget.style.transform="scale(0.96)";}}
    onMouseUp={(e)=>{e.currentTarget.style.transform="scale(1)";}}
    >
      <span style={{ fontSize:22 }}>{icon}</span>
      <span>{label}</span>
    </button>
  );
}

/* ═══════════ MAIN APP ═══════════ */
function WarkopSaja() {
  const [ent, setEnt] = useState("individual");
  const [months, setMonths] = useState(Array.from({length:12}, emptyM));
  const [tab, setTab] = useState("input");
  const [expM, setExpM] = useState(null);
  const [qf, setQf] = useState(false);
  const [qR, setQR] = useState("");
  const [qG, setQG] = useState("");
  const [qU, setQU] = useState("");
  const [qE, setQE] = useState("");
  const [saveStatus, setSaveStatus] = useState("");
  const [loaded, setLoaded] = useState(false);
  const saveTimer = useRef(null);

  // ─── Load on mount ───
  useEffect(() => {
    const d = loadData();
    if (d) {
      if (d.ent) setEnt(d.ent);
      if (d.months) {
        const fixed = d.months.map(m => ({
          revenue: m.revenue || "",
          items: {
            gaji: (m.items && m.items.gaji) || [],
            utilitas: (m.items && m.items.utilitas) || [],
            elektronik: (m.items && m.items.elektronik) || [],
          }
        }));
        setMonths(fixed);
        let maxId = 0;
        fixed.forEach(m => CATS.forEach(c => (m.items[c.key]||[]).forEach(it => { if(it.id > maxId) maxId = it.id; })));
        _id = maxId + 1;
      }
      setSaveStatus("Data berhasil dimuat ✓");
      setTimeout(() => setSaveStatus(""), 2000);
    }
    setLoaded(true);
  }, []);

  // ─── Auto-save on change (debounced) ───
  useEffect(() => {
    if (!loaded) return;
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => {
      saveData({ ent, months });
      setSaveStatus("Tersimpan ✓");
      setTimeout(() => setSaveStatus(""), 1500);
    }, 800);
    return () => { if(saveTimer.current) clearTimeout(saveTimer.current); };
  }, [months, ent, loaded]);

  const updateRev = useCallback((i,v) => setMonths(p => { const n=[...p]; n[i]={...n[i],revenue:v}; return n; }), []);
  const addItem = useCallback((mi,ck,item) => setMonths(p => { const n=[...p]; const m={...n[mi],items:{...n[mi].items}}; m.items[ck]=[...m.items[ck],item]; n[mi]=m; return n; }), []);
  const rmItem = useCallback((mi,ck,id) => setMonths(p => { const n=[...p]; const m={...n[mi],items:{...n[mi].items}}; m.items[ck]=m.items[ck].filter(x=>x.id!==id); n[mi]=m; return n; }), []);

  const quickFillFn = () => {
    setMonths(Array.from({length:12}, ()=>({
      revenue:qR||"",
      items:{
        gaji:qG?[{id:nid(),name:"Gaji Karyawan",amount:qG}]:[],
        utilitas:qU?[{id:nid(),name:"Tagihan Utilitas",amount:qU}]:[],
        elektronik:qE?[{id:nid(),name:"Alat Elektronik",amount:qE}]:[],
      },
    }))); setQf(false);
  };

  const resetAll = () => {
    if (confirm("Yakin hapus semua data? Data yang sudah tersimpan juga akan dihapus.")) {
      setMonths(Array.from({length:12}, emptyM));
      setEnt("individual");

              <div style={{ flex:1 }}>
                <div style={{ fontSize:13, fontWeight:600, color:T.green }}>Data Tersimpan Otomatis</div>
                <div style={{ fontSize:11, color:T.textSec, marginTop:2 }}>Semua perubahan langsung disimpan. Buka lagi kapan saja — data Anda tetap ada.</div>
              </div>
            </Card>

            <div style={{ fontSize:10, color:T.textMuted, fontWeight:600, letterSpacing:1.5, textTransform:"uppercase", marginTop:4 }}>Download Laporan</div>
            <div style={{ display:"flex", gap:10 }}>
              <ActionBtn icon="📄" label="Laporan Pajak (PDF)" onClick={()=>downloadPDF(months,md,tots,ent)} color={T.accent} />
              <ActionBtn icon="📊" label="Data Pengeluaran (Excel)" onClick={()=>downloadCSV(months,md)} color="#34D399" />
            </div>

            <Card style={{ padding:14 }}>
              <div style={{ fontSize:12, fontWeight:600, color:T.text, marginBottom:8 }}>📄 Laporan Pajak (PDF)</div>
              <div style={{ fontSize:11, color:T.textSec, lineHeight:1.7 }}>
                Laporan lengkap dengan ringkasan keuangan, rincian pajak bulanan, jadwal pembayaran, dan detail pengeluaran. Cocok untuk <strong style={{color:T.text}}>dibagi ke konsultan pajak</strong> atau sebagai arsip pribadi.
              </div>
            </Card>

            <Card style={{ padding:14 }}>
              <div style={{ fontSize:12, fontWeight:600, color:T.text, marginBottom:8 }}>📊 Data Pengeluaran (Excel/CSV)</div>
              <div style={{ fontSize:11, color:T.textSec, lineHeight:1.7 }}>
                File CSV yang bisa dibuka di <strong style={{color:T.text}}>Microsoft Excel atau Google Sheets</strong>. Berisi semua data omzet, pengeluaran per kategori, detail item, pajak, dan laba bersih per bulan.
              </div>
            </Card>

            <div style={{ marginTop:12, fontSize:10, color:T.textMuted, fontWeight:600, letterSpacing:1.5, textTransform:"uppercase" }}>Pengaturan Data</div>
            <Card style={{ padding:14, border:`1px solid rgba(248,113,113,0.1)` }}>
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                <div>
                  <div style={{ fontSize:12, fontWeight:600, color:T.red }}>Reset Semua Data</div>
                  <div style={{ fontSize:11, color:T.textMuted, marginTop:2 }}>Hapus semua data dan mulai dari awal</div>
                </div>
                <button onClick={resetAll} style={{
                  padding:"8px 16px", borderRadius:T.radiusXs, border:"none",
                  background:T.redBg, color:T.red, fontSize:11, fontWeight:600,
                  cursor:"pointer", fontFamily:font,
                }}>Reset</button>
              </div>
            </Card>
          </div>
        )}
      </div>

      {/* ═══ STICKY FOOTER ═══ */}
      {tr>0 && isU && (
        <div style={{
          position:"fixed", bottom:0, left:0, right:0, padding:"14px 20px 16px",
          background:`linear-gradient(180deg, transparent 0%, ${T.bg}ee 15%, ${T.bg} 100%)`,
          backdropFilter:"blur(12px)", display:"flex", justifyContent:"space-between", alignItems:"center",
          borderTop:`1px solid ${T.cardBorder}`,
        }}>
          <div>
            <div style={{ fontSize:9, color:T.textMuted, fontWeight:600, letterSpacing:1.5 }}>LABA BERSIH</div>
            <div style={{ fontSize:20, fontWeight:800, color:tots.netProfit>=0?T.green:T.red, letterSpacing:"-0.5px" }}>{fmt(tots.netProfit)}</div>
          </div>
          <div style={{ textAlign:"center" }}>
            <div style={{ fontSize:9, color:T.textMuted, fontWeight:600, letterSpacing:1.5 }}>PAJAK</div>
            <div style={{ fontSize:16, fontWeight:700, color:T.accent }}>{fmt(tots.tax)}</div>
          </div>
          <div style={{ textAlign:"right" }}>
            <div style={{ fontSize:9, color:T.textMuted, fontWeight:600, letterSpacing:1.5 }}>OMZET</div>
            <div style={{ fontSize:14, fontWeight:600, color:T.text }}>{fmt(tr)}</div>
          </div>
        </div>
      )}

      <div style={{ padding:"8px 20px 140px", fontSize:9, color:"rgba(120,113,108,0.4)", textAlign:"center", lineHeight:1.5 }}>
        Estimasi saja · Konsultasikan dengan konsultan pajak · PP 23/2018 & UU HPP
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<WarkopSaja/>);
</script>
</body>
</html>
